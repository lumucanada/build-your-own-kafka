<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 · Todo App</title>
    <style>
        :root { --bg: #f7f6f3; --card: #fff; --text: #37352f; --text-light: #9b9a97; --border: #e9e9e7; --blue: #2383e2; --green: #0f7b47; --red: #e03e3e; --yellow: #dfab01; --radius: 3px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .navbar {
            background: var(--card); box-shadow: 0 1px 2px rgba(0,0,0,.04);
            height: 48px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; position: sticky; top: 0; z-index: 10;
        }
        .navbar .brand { font-weight: 700; }
        .navbar a { text-decoration: none; color: var(--blue); font-size: 13px; font-weight: 600; padding: 4px 10px; border-radius: var(--radius); }
        .navbar a:hover { background: #e8f0fe; }
        .navbar a.danger { color: var(--red); }
        .navbar a.danger:hover { background: #fdebec; }
        .container { max-width: 720px; margin: 28px auto; padding: 0 16px; }
        .page-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        @media (max-width: 480px) { .stats-row { grid-template-columns: 1fr; } }
        .stat-card {
            background: var(--card); border-radius: var(--radius);
            box-shadow: 0 1px 3px rgba(0,0,0,.04); padding: 18px; text-align: center;
        }
        .stat-card .val { font-size: 26px; font-weight: 800; }
        .stat-card .lbl { font-size: 12px; color: var(--text-light); margin-top: 2px; }
        .card {
            background: var(--card); border-radius: var(--radius);
            box-shadow: 0 1px 3px rgba(0,0,0,.04); padding: 20px; margin-bottom: 14px;
        }
        .card h3 { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
        .card .desc { font-size: 12px; color: var(--text-light); margin-bottom: 12px; }
        .btn {
            padding: 8px 16px; border: none; border-radius: var(--radius);
            font-size: 13px; font-weight: 600; cursor: pointer; margin: 0 6px 6px 0;
            transition: all .1s;
        }
        .btn:active { transform: scale(.97); }
        .btn-primary { background: var(--blue); color: #fff; }
        .btn-primary:hover { background: #1a6fc4; }
        .btn-success { background: var(--green); color: #fff; }
        .btn-success:hover { background: #0b6138; }
        .btn-danger { background: var(--red); color: #fff; }
        .btn-danger:hover { background: #c23030; }
        .btn-outline { background: #fff; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { background: #f7f6f3; }
        .form-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .form-row input {
            flex: 1; min-width: 100px; padding: 8px 12px;
            border: 1px solid var(--border); border-radius: var(--radius);
            font-size: 13px; outline: none;
        }
        .form-row input:focus { border-color: var(--blue); }
        .msg { margin-top: 10px; font-size: 13px; padding: 8px 12px; border-radius: var(--radius); display: none; }
        .msg.success { display: block; background: #d9f3e6; color: #0b6138; }
        .msg.error { display: block; background: #fdebec; color: #991b1b; }
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #37352f; color: #fff; padding: 10px 24px; border-radius: 6px;
            font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<nav class="navbar">
    <span class="brand">⚙️ 后台管理</span>
    <span>
        <span style="font-size:13px;color:var(--text-light);margin-right:8px;">👤 {{ user.username }}</span>
        <a href="/">📋 首页</a>
        <a href="/logout" class="danger">退出</a>
    </span>
</nav>

<div class="container">
    <h2 class="page-title">📊 数据概览</h2>

    <div class="stats-row">
        <div class="stat-card"><div class="val" id="sTotal">-</div><div class="lbl">总任务数</div></div>
        <div class="stat-card"><div class="val" id="sDone">-</div><div class="lbl">已完成</div></div>
        <div class="stat-card"><div class="val" id="sRate">-</div><div class="lbl">完成率</div></div>
    </div>

    <div class="card">
        <h3>🗂️ 批量操作</h3>
        <p class="desc">操作不可恢复，请谨慎使用</p>
        <button class="btn btn-success" onclick="batchDelete('completed')">🧹 清除已完成</button>
        <button class="btn btn-danger"  onclick="batchDelete('all')">⚠️ 清空全部</button>
        <button class="btn btn-outline" onclick="exportCSV()">📥 导出 CSV</button>
        <div class="msg" id="batchMsg"></div>
    </div>

    <div class="card">
        <h3>🔒 修改密码</h3>
        <div class="form-row">
            <input type="password" id="oldPw" placeholder="旧密码">
            <input type="password" id="newPw" placeholder="新密码（≥6位）">
            <button class="btn btn-primary" onclick="changePassword()">确认</button>
        </div>
        <div class="msg" id="pwMsg"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
async function loadStats() {
    try {
        const res = await fetch('/api/stats');
        const json = await res.json();
        const d = json.data;
        document.getElementById('sTotal').textContent = d.total;
        document.getElementById('sDone').textContent = d.done;
        document.getElementById('sRate').textContent = d.completion_rate;
    } catch (_) { showMsg('batchMsg', 'error', '加载失败'); }
}

async function batchDelete(filter) {
    const msg = filter === 'all' ? '确定清空全部任务？' : '确定删除所有已完成？';
    if (!confirm(msg)) return;
    try {
        const res = await fetch('/api/tasks/batch-delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ filter })
        });
        const json = await res.json();
        showMsg('batchMsg', 'success', `✅ 已删除 ${json.data.deleted} 条任务`);
        loadStats();
    } catch (_) { showMsg('batchMsg', 'error', '操作失败'); }
}

function exportCSV() {
    window.open('/api/tasks/export', '_blank');
    toast('📥 CSV 下载中...');
}

async function changePassword() {
    const oldPw = document.getElementById('oldPw').value;
    const newPw = document.getElementById('newPw').value;
    if (!oldPw || !newPw) { showMsg('pwMsg', 'error', '请填写所有字段'); return; }
    if (newPw.length < 6) { showMsg('pwMsg', 'error', '新密码至少6位'); return; }
    try {
        const res = await fetch('/api/change-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ old_password: oldPw, new_password: newPw })
        });
        const json = await res.json();
        if (json.ok) {
            showMsg('pwMsg', 'success', '✅ 密码修改成功');
            document.getElementById('oldPw').value = '';
            document.getElementById('newPw').value = '';
        } else {
            showMsg('pwMsg', 'error', '❌ ' + json.message);
        }
    } catch (_) { showMsg('pwMsg', 'error', '操作失败'); }
}

function showMsg(id, type, text) {
    const el = document.getElementById(id);
    el.className = 'msg ' + type;
    el.textContent = text;
    setTimeout(() => el.className = 'msg', 4000);
}

function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._tid);
    el._tid = setTimeout(() => el.classList.remove('show'), 2000);
}

loadStats();
</script>
</body>
</html>
