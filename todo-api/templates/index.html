<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 Todo App</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
            --danger: #ef4444;
            --text: #1f2937;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
            --shadow-lg: 0 10px 25px rgba(0,0,0,.1);
            --radius: 12px;
            --radius-sm: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ---- 顶部导航 ---- */
        .navbar {
            background: var(--card-bg);
            box-shadow: var(--shadow);
            padding: 0 20px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar .brand {
            font-size: 16px;
            font-weight: 700;
        }

        .navbar .nav-links {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--primary);
            font-weight: 600;
            padding: 5px 10px;
            border-radius: 6px;
            transition: background .15s;
        }

        .nav-links a:hover { background: #eef2ff; }
        .nav-links a.danger { color: var(--danger); }
        .nav-links a.danger:hover { background: #fef2f2; }

        /* ---- 主内容 ---- */
        .main-content {
            display: flex;
            justify-content: center;
            padding: 32px 16px;
        }

        .app {
            width: 100%;
            max-width: 540px;
        }

        /* ---- 头部 ---- */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }

        .header .stats {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .header .stats span {
            font-weight: 600;
            color: var(--primary);
        }

        /* ---- 卡片 ---- */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            padding: 20px;
            margin-bottom: 16px;
        }

        /* ---- 输入区 ---- */
        .input-group {
            display: flex;
            gap: 8px;
        }

        .input-group input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 15px;
            outline: none;
            transition: border-color .2s;
        }

        .input-group input:focus {
            border-color: var(--primary);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
            white-space: nowrap;
        }

        .btn:active { transform: scale(.96); }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-primary:hover { background: var(--primary-hover); }

        .btn-sm {
            padding: 4px 12px;
            font-size: 12px;
            border-radius: 6px;
        }

        .btn-outline-success {
            background: transparent;
            color: var(--success);
            border: 1.5px solid var(--success);
        }
        .btn-outline-success:hover {
            background: var(--success);
            color: #fff;
        }

        .btn-outline-danger {
            background: transparent;
            color: var(--danger);
            border: 1.5px solid var(--danger);
        }
        .btn-outline-danger:hover {
            background: var(--danger);
            color: #fff;
        }

        .btn-outline-undo {
            background: transparent;
            color: #f59e0b;
            border: 1.5px solid #f59e0b;
        }
        .btn-outline-undo:hover {
            background: #f59e0b;
            color: #fff;
        }

        /* ---- 任务列表 ---- */
        .task-list {
            list-style: none;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            animation: slideIn .3s ease;
            transition: background .2s;
        }

        .task-item:last-child { border-bottom: none; }

        .task-item:hover { background: #f9fafb; }

        .task-item .status-icon {
            font-size: 20px;
            flex-shrink: 0;
        }

        .task-item .task-text {
            flex: 1;
            font-size: 15px;
            word-break: break-word;
        }

        .task-item .task-text.done {
            text-decoration: line-through;
            color: var(--text-secondary);
        }

        .task-item .actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        /* ---- 空状态 ---- */
        .empty {
            text-align: center;
            padding: 32px 16px;
            color: var(--text-secondary);
        }
        .empty .icon { font-size: 48px; display: block; margin-bottom: 8px; }
        .empty p { font-size: 14px; }

        /* ---- 动画 ---- */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ---- Toast ---- */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: #fff;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 13px;
            opacity: 0;
            transition: opacity .3s;
            pointer-events: none;
            z-index: 999;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<!-- 顶部导航 -->
<nav class="navbar">
    <span class="brand">📝 Todo List</span>
    <span class="nav-links">
        <a href="/admin">⚙️ 后台管理</a>
        <a href="/logout" class="danger">退出</a>
    </span>
</nav>

<div class="main-content">
<div class="app">
    <!-- 头部统计 -->
    <div class="header">
        <p class="stats">共 <span id="totalCount">0</span> 项 · 已完成 <span id="doneCount">0</span></p>
    </div>

    <!-- 输入区 -->
    <div class="card">
        <div class="input-group">
            <input id="taskInput" placeholder="输入要做的事情……" maxlength="200" autofocus>
            <button class="btn btn-primary" onclick="addTask()">✚ 添加</button>
        </div>
    </div>

    <!-- 任务列表 -->
    <div class="card" id="taskCard">
        <ul class="task-list" id="list"></ul>
        <div class="empty" id="empty">
            <span class="icon">📭</span>
            <p>还没有任务，来添加一个吧</p>
        </div>
    </div>
</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const taskInput = document.getElementById('taskInput');
const listEl = document.getElementById('list');
const emptyEl = document.getElementById('empty');
const totalEl = document.getElementById('totalCount');
const doneEl = document.getElementById('doneCount');
const toastEl = document.getElementById('toast');

// ---- 统一请求（401 自动跳转登录）----
async function api(url, opts = {}) {
    let res = await fetch(url, opts);
    if (res.status === 401) {
        window.location.href = '/login';
        throw new Error('未登录');
    }
    return res;
}

// ---- 回车添加 ----
taskInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
});

// ---- 加载列表 ----
async function loadTasks() {
    try {
        let res = await api('/list');
        let json = await res.json();
        let tasks = json.data || [];

        listEl.innerHTML = '';

        if (tasks.length === 0) {
            emptyEl.style.display = 'block';
        } else {
            emptyEl.style.display = 'none';
            tasks.forEach(t => renderTask(t));
        }

        updateStats(tasks);
    } catch (err) {
        toast('⚠️ 加载失败，请刷新页面');
    }
}

// ---- 渲染单条 ----
function renderTask(t) {
    let isDone = t.completed == 1;
    let icon = isDone ? '✅' : '⏳';
    let textClass = isDone ? 'task-text done' : 'task-text';

    let li = document.createElement('li');
    li.className = 'task-item';
    li.id = 'task-' + t.id;
    li.innerHTML = `
        <span class="status-icon">${icon}</span>
        <span class="${textClass}">${escapeHtml(t.task)}</span>
        <span class="actions">
            ${isDone
                ? `<button class="btn btn-sm btn-outline-undo" onclick="undoTask(${t.id})">↩ 撤销</button>`
                : `<button class="btn btn-sm btn-outline-success" onclick="doneTask(${t.id})">✓ 完成</button>`
            }
            <button class="btn btn-sm btn-outline-danger" onclick="deleteTask(${t.id})">✕</button>
        </span>
    `;
    listEl.appendChild(li);
}

// ---- 统计 ----
function updateStats(tasks) {
    totalEl.textContent = tasks.length;
    doneEl.textContent = tasks.filter(t => t.completed == 1).length;
}

// ---- 添加 ----
async function addTask() {
    let task = taskInput.value.trim();
    if (!task) return toast('请输入任务内容');

    try {
        let res = await api('/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ task })
        });
        let json = await res.json();
        if (!json.ok) return toast(json.message);

        taskInput.value = '';
        taskInput.focus();
        await loadTasks();
    } catch (err) {
        toast('⚠️ 添加失败');
    }
}

// ---- 完成 ----
async function doneTask(id) {
    try {
        await api('/done', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id })
        });
        await loadTasks();
    } catch (err) {
        toast('⚠️ 操作失败');
    }
}

// ---- 撤销完成 ----
async function undoTask(id) {
    try {
        await api('/undo', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id })
        });
        await loadTasks();
    } catch (err) {
        toast('⚠️ 操作失败');
    }
}

// ---- 删除 ----
async function deleteTask(id) {
    if (!confirm('确定删除这条任务吗？')) return;

    try {
        await api('/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id })
        });
        await loadTasks();
    } catch (err) {
        toast('⚠️ 删除失败');
    }
}

// ---- 工具 ----
function escapeHtml(str) {
    let div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastEl._timer);
    toastEl._timer = setTimeout(() => toastEl.classList.remove('show'), 2000);
}

// ---- 启动 ----
loadTasks();
</script>

</body>
</html>
