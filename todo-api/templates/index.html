<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo — 任务管理</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>

<div class="layout">

    <!-- ======== 侧边栏 ======== -->
    <aside class="sidebar">
        <div class="sidebar-logo">📝 Todo App</div>

        <nav class="sidebar-nav">
            <a href="#" data-filter="all" class="active">
                📋 全部任务 <span class="badge" id="totalCount">0</span>
            </a>
            <a href="#" data-filter="pending">
                ⏳ 待完成 <span class="badge" id="pendingCount">0</span>
            </a>
            <a href="#" data-filter="completed">
                ✅ 已完成
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="/admin">⚙️ 后台管理</a>
            <a href="/logout">🚪 退出登录</a>
        </div>
    </aside>

    <!-- ======== 主区域 ======== -->
    <main class="main">
        <div class="main-header">
            <h2 id="filterTitle">全部任务</h2>
            <p class="subtitle">双击任务可编辑 · 点击复选框标记完成</p>
        </div>

        <div class="main-body">
            <!-- 添加栏 -->
            <div class="add-task-wrap">
                <span class="plus-icon">＋</span>
                <input id="addInput" placeholder="添加新任务……" maxlength="500" autofocus>
                <button id="addBtn" onclick="addTask()">添加</button>
            </div>

            <!-- 任务列表 -->
            <ul class="task-list" id="taskList"></ul>
            <div class="empty-state" id="emptyState">
                <span class="icon">📭</span>
                <p>没有任务 — 来添加一个吧</p>
            </div>
        </div>
    </main>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
