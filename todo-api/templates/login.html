<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · Todo App</title>
    <style>
        :root { --blue: #2383e2; --text: #37352f; --text-light: #9b9a97; --border: #e9e9e7; --bg: #f7f6f3; --card: #fff; --radius: 3px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }
        .card {
            width: 100%; max-width: 380px;
            background: var(--card);
            border-radius: 3px;
            box-shadow: 0 4px 16px rgba(0,0,0,.06);
            padding: 40px 32px;
            animation: up .4s ease;
        }
        @keyframes up { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        .card .logo { text-align: center; font-size: 40px; margin-bottom: 4px; }
        .card h1 { text-align: center; font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
        .card .sub  { text-align: center; font-size: 13px; color: var(--text-light); margin-bottom: 28px; }

        .field { margin-bottom: 14px; }
        .field label { display: block; font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
        .field input {
            width: 100%; padding: 10px 12px;
            border: 1px solid var(--border); border-radius: var(--radius);
            font-size: 14px; outline: none; transition: border-color .15s;
        }
        .field input:focus { border-color: var(--blue); }

        .btn {
            width: 100%; padding: 11px;
            background: var(--blue); color: #fff;
            border: none; border-radius: var(--radius);
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: background .15s; margin-top: 6px;
        }
        .btn:hover { background: #1a6fc4; }
        .btn:disabled { opacity: .6; cursor: not-allowed; }

        .err { text-align: center; color: #e03e3e; font-size: 13px; margin-top: 10px; min-height: 20px; }
        .hint { text-align: center; margin-top: 18px; padding: 10px; background: #fbf3db; border-radius: var(--radius); font-size: 12px; color: #906c00; }
        .hint code { background: #f5e7b3; padding: 2px 6px; border-radius: 3px; font-weight: 600; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">📝</div>
    <h1>Todo App</h1>
    <p class="sub">请登录以继续</p>

    <div class="field">
        <label for="username">用户名</label>
        <input id="username" placeholder="请输入用户名" autofocus>
    </div>
    <div class="field">
        <label for="password">密码</label>
        <input id="password" type="password" placeholder="请输入密码">
    </div>

    <button class="btn" id="loginBtn" onclick="doLogin()">登 录</button>
    <p class="err" id="error"></p>

    <div class="hint">🔑 默认：<code>admin</code> / <code>admin123</code></div>
</div>

<script>
const u = document.getElementById('username');
const p = document.getElementById('password');
const e = document.getElementById('error');
const b = document.getElementById('loginBtn');

u.addEventListener('keydown', ev => { if (ev.key === 'Enter') p.focus(); });
p.addEventListener('keydown', ev => { if (ev.key === 'Enter') doLogin(); });

async function doLogin() {
    const username = u.value.trim();
    const password = p.value;
    if (!username || !password) { e.textContent = '请填写用户名和密码'; return; }
    b.disabled = true; b.textContent = '登录中...'; e.textContent = '';
    try {
        const res = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const json = await res.json();
        if (!json.ok) { e.textContent = '❌ ' + json.message; b.disabled = false; b.textContent = '登 录'; return; }
        window.location.href = '/';
    } catch (_) {
        e.textContent = '⚠️ 网络错误';
        b.disabled = false; b.textContent = '登 录';
    }
}
</script>
</body>
</html>
