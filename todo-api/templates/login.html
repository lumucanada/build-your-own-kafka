<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · Todo App</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --text: #1f2937;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --shadow-lg: 0 10px 25px rgba(0,0,0,.1);
            --radius: 12px;
            --radius-sm: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            padding: 40px 32px;
            animation: slideUp .5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card .logo {
            text-align: center;
            font-size: 48px;
            margin-bottom: 8px;
        }

        .login-card h1 {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }

        .login-card .subtitle {
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 15px;
            outline: none;
            transition: border-color .2s;
        }

        .form-group input:focus {
            border-color: var(--primary);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s, transform .1s;
            margin-top: 8px;
        }

        .btn-login:hover { background: var(--primary-hover); }
        .btn-login:active { transform: scale(.97); }
        .btn-login:disabled { opacity: .6; cursor: not-allowed; }

        .error-msg {
            text-align: center;
            color: #ef4444;
            font-size: 13px;
            margin-top: 12px;
            min-height: 20px;
        }

        .hint {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            background: #fef3c7;
            border-radius: var(--radius-sm);
            font-size: 12px;
            color: #92400e;
        }

        .hint code {
            background: #fde68a;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">📝</div>
    <h1>Todo App</h1>
    <p class="subtitle">请登录以继续</p>

    <div class="form-group">
        <label for="username">用户名</label>
        <input id="username" placeholder="请输入用户名" autofocus>
    </div>

    <div class="form-group">
        <label for="password">密码</label>
        <input id="password" type="password" placeholder="请输入密码">
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">登 录</button>

    <p class="error-msg" id="error"></p>

    <div class="hint">
        🔑 默认账号：<code>admin</code> 密码：<code>admin123</code>
    </div>
</div>

<script>
const usernameEl = document.getElementById('username');
const passwordEl = document.getElementById('password');
const errorEl = document.getElementById('error');
const loginBtn = document.getElementById('loginBtn');

// 回车登录
passwordEl.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
});
usernameEl.addEventListener('keydown', e => {
    if (e.key === 'Enter') passwordEl.focus();
});

async function doLogin() {
    let username = usernameEl.value.trim();
    let password = passwordEl.value;

    if (!username || !password) {
        errorEl.textContent = '请输入用户名和密码';
        return;
    }

    loginBtn.disabled = true;
    loginBtn.textContent = '登录中...';
    errorEl.textContent = '';

    try {
        let res = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        let json = await res.json();

        if (!json.ok) {
            errorEl.textContent = '❌ ' + json.message;
            loginBtn.disabled = false;
            loginBtn.textContent = '登 录';
            return;
        }

        window.location.href = '/';
    } catch (err) {
        errorEl.textContent = '⚠️ 网络错误，请重试';
        loginBtn.disabled = false;
        loginBtn.textContent = '登 录';
    }
}
</script>

</body>
</html>
